services:
  invexis-inventory-service:
    build: .
    container_name: invexis-inventory-service
    restart: unless-stopped
    environment:
      - DB_MONGO=mongodb://root@mongodb:27017/inventorydb?authSource=admin
      - RABBITMQ_URL=amqp://invexis:invexispass@rabbitmq:5672
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    ports:
      - "3000:3000"
    networks:
      - invexis-network
    volumes:
      - ./logs:/app/logs

  mongodb:
    image: mongo:latest
    environment:
      - MONGO_INITDB_ROOT_USERNAME=root
      - MONGO_INITDB_ROOT_PASSWORD=example
    volumes:
      - mongo-data:/data/db
    healthcheck:
      test: ["CMD", "mongo", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - invexis-network

  rabbitmq:
    image: rabbitmq:3-management
    environment:
      - RABBITMQ_DEFAULT_USER=invexis
      - RABBITMQ_DEFAULT_PASS=invexispass
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 20s
    networks:
      - invexis-network

volumes:
  mongo-data:

networks:
  invexis-network:
    driver: bridge