<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Invexis Realtime Notification Tester</title>
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .notification-card {
            transition: all 0.3s ease;
        }

        .notification-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        .intent-operational {
            border-left: 4px solid #3b82f6;
            background-color: #f7fafc;
        }

        .intent-financial {
            border-left: 4px solid #22c55e;
            background-color: #f7fafc;
        }

        .intent-risk_security {
            border-left: 4px solid #ef4444;
            background-color: #f7fafc;
        }

        .intent-accountability {
            border-left: 4px solid #eab308;
            background-color: #f7fafc;
        }

        .priority-urgent {
            animation: pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: .8;
            }
        }
    </style>
</head>

<body class="bg-gray-100 min-h-screen p-8 font-sans">
    <div class="max-w-4xl mx-auto">
        <header class="mb-8 flex justify-between items-center">
            <div>
                <h1 class="text-3xl font-bold text-gray-800">🔔 Notification Debugger</h1>
                <p class="text-gray-500">Realtime WebSocket Inspector</p>
            </div>
            <div id="connectionStatus" class="px-4 py-2 rounded-full text-sm font-semibold bg-red-100 text-red-800">
                Disconnected
            </div>
        </header>

        <!-- Connection Settings -->
        <div class="bg-white rounded-lg shadow p-6 mb-8">
            <h2 class="text-xl font-semibold mb-4 text-gray-700">Connection Settings</h2>
            <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">WebSocket URL</label>
                    <input type="text" id="wsUrl" value="http://localhost:9002"
                        class="w-full px-3 py-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">User ID (Recipient)</label>
                    <input type="text" id="userId" placeholder="e.g. 64f..."
                        class="w-full px-3 py-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Auth Token (Optional)</label>
                    <input type="text" id="token" placeholder="JWT..."
                        class="w-full px-3 py-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
            </div>
            <div class="mt-4 flex gap-3">
                <button onclick="connect()" id="btnConnect"
                    class="px-6 py-2 bg-blue-600 text-white rounded hover:bg-blue-700 font-medium transition">
                    Connect
                </button>
                <button onclick="disconnect()" id="btnDisconnect"
                    class="px-6 py-2 bg-gray-200 text-gray-700 rounded hover:bg-gray-300 font-medium transition hidden">
                    Disconnect
                </button>
                <button onclick="clearLogs()"
                    class="px-6 py-2 border border-gray-300 text-gray-600 rounded hover:bg-gray-50 font-medium transition ml-auto">
                    Clear Logs
                </button>
            </div>
        </div>

        <!-- Trigger Notification -->
        <div class="bg-white rounded-lg shadow p-6 mb-8 hover:shadow-md transition-shadow">
            <h2 class="text-xl font-semibold mb-4 text-gray-700 flex items-center gap-2">
                <span>🚀 Trigger Event Simulation</span>
                <span class="text-xs font-normal text-gray-400 bg-gray-100 px-2 py-0.5 rounded">Injects event into
                    Notification Service</span>
            </h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-4 mb-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Notification Service URL</label>
                    <input type="text" id="apiBaseUrl" value="http://localhost:8008"
                        class="w-full px-3 py-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Auth Token (Bearer)</label>
                    <input type="text" id="apiToken" placeholder="Paste JWT from Login..."
                        class="w-full px-3 py-2 border rounded focus:ring-2 focus:ring-blue-500 outline-none">
                </div>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-4 gap-4 items-end">
                <div class="md:col-span-1">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Event Type</label>
                    <select id="eventType" onchange="updatePayloadTemplate()"
                        class="w-full px-3 py-2 border rounded focus:ring-2 focus:ring-green-500 outline-none bg-white">
                        <option value="company.created">company.created</option>
                        <option value="company.suspended">company.suspended</option>
                        <option value="shop.created">shop.created</option>
                        <option value="sale.created">sale.created</option>
                        <option value="sale.return.created">sale.return.created</option>
                        <option value="inventory.low_stock">inventory.low_stock</option>
                        <option value="inventory.out_of_stock">inventory.out_of_stock</option>
                        <option value="debt.overdue">debt.overdue</option>
                        <option value="payment.success">payment.success</option>
                        <option value="payment.failed">payment.failed</option>
                        <option value="user.created">user.created</option>
                    </select>
                </div>
                <!-- Hidden inputs for legacy layout compatibility, we use JSON payload now -->

                <div class="md:col-span-3">
                    <label class="block text-sm font-medium text-gray-700 mb-1">Event Data (JSON)</label>
                    <textarea id="eventData" rows="5"
                        class="w-full px-3 py-2 border rounded focus:ring-2 focus:ring-green-500 outline-none font-mono text-xs">
{
  "companyId": "comp_123",
  "shopId": "shop_456",
  "customerId": "cust_789",
  "totalAmount": 150.00,
  "items": [{"name": "Item 1", "price": 50}, {"name": "Item 2", "price": 100}]
}
                    </textarea>
                </div>

                <div class="md:col-span-4">
                    <button onclick="simulateEvent()"
                        class="w-full px-6 py-2 bg-green-600 text-white rounded hover:bg-green-700 font-medium transition flex justify-center items-center gap-2">
                        <span>Simulate Event</span>
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                            stroke="currentColor">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                d="M13 10V3L4 14h7v7l9-11h-7z" />
                        </svg>
                    </button>
                    <div id="simResponse" class="mt-2 text-xs text-center text-gray-500"></div>
                </div>
            </div>
        </div>

        <!-- Live Feed -->
        <div class="bg-white rounded-lg shadow overflow-hidden">
            <div class="bg-gray-50 px-6 py-3 border-b flex justify-between items-center">
                <h2 class="font-semibold text-gray-700">Live Notification Feed</h2>
                <span id="msgCount" class="bg-gray-200 text-gray-600 px-2 py-0.5 rounded text-xs">0 items</span>
            </div>
            <div id="logArea" class="p-6 space-y-4 max-h-[600px] overflow-y-auto bg-gray-50/50">
                <div class="text-center text-gray-400 py-12 italic" id="emptyState">
                    Waiting for notifications...
                </div>
            </div>
        </div>
    </div>

    <script>
        let socket;
        let count = 0;

        function updateStatus(status, connected) {
            const el = document.getElementById('connectionStatus');
            el.textContent = status;
            el.className = `px-4 py-2 rounded-full text-sm font-semibold ${connected ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}`;

            document.getElementById('btnConnect').classList.toggle('hidden', connected);
            document.getElementById('btnDisconnect').classList.toggle('hidden', !connected);
        }

        function connect() {
            const url = document.getElementById('wsUrl').value;
            const userId = document.getElementById('userId').value;
            // Token for websocket auth can be same as API token
            const token = document.getElementById('token').value || document.getElementById('apiToken').value;

            if (!userId) {
                alert('User ID is required to subscribe to user channels');
                return;
            }

            console.log(`Connecting to ${url}...`);

            // Use Handshake Auth (Matches App Behavior)
            socket = io(url, {
                transports: ['websocket'],
                reconnection: true,
                auth: {
                    token: token,
                    userId: userId
                }
            });

            socket.on('connect', () => {
                console.log('Connected!');
                updateStatus('Connected', true);
                logSystem('✅ Connected (Handshake Auth Sent)');
            });

            socket.on('authenticated', (data) => {
                logSystem(`✅ Authenticated as user ${data.userId}`);
            });

            socket.on('authentication_error', (data) => {
                logSystem(`❌ Authentication Failed: ${data.error}`, 'error');
            });

            socket.on('disconnect', () => {
                console.log('Disconnected');
                updateStatus('Disconnected', false);
                logSystem('🔌 Disconnected from server');
            });

            socket.on('notification', (data) => {
                console.log('Notification received:', data);
                count++;
                document.getElementById('msgCount').textContent = `${count} items`;
                renderNotification(data);
            });

            // Should also listen for connection_error
            socket.on('connect_error', (err) => {
                logSystem(`❌ Connection Error: ${err.message}`, 'error');
            });

            // Listen for other potential events
            socket.on('broadcast', (data) => renderNotification({ ...data, type: 'BROADCAST' }));
        }

        function disconnect() {
            if (socket) socket.disconnect();
        }

        function clearLogs() {
            document.getElementById('logArea').innerHTML = '<div class="text-center text-gray-400 py-12 italic" id="emptyState">Logs cleared. Waiting...</div>';
            count = 0;
            document.getElementById('msgCount').textContent = '0 items';
        }

        function logSystem(msg, type = 'info') {
            const area = document.getElementById('logArea');
            document.getElementById('emptyState')?.remove();

            const div = document.createElement('div');
            div.className = `text-xs text-center border-b pb-2 mb-2 ${type === 'error' ? 'text-red-500' : 'text-gray-400'}`;
            div.innerText = `[${new Date().toLocaleTimeString()}] ${msg}`;
            area.prepend(div);
        }

        function renderNotification(data) {
            const area = document.getElementById('logArea');
            document.getElementById('emptyState')?.remove();

            // Extract fields based on your schema
            const intent = data.payload?.intent || data.intent || 'operational';
            const role = data.payload?.role || 'unknown';
            const type = data.payload?.eventType || data.type || 'Generic';
            const priority = data.priority || 'normal';

            const card = document.createElement('div');
            card.className = `notification-card bg-white p-4 rounded shadow-sm border border-gray-100 intent-${intent} priority-${priority}`;

            card.innerHTML = `
                <div class="flex justify-between items-start mb-2">
                    <div class="flex items-center gap-2">
                        <span class="px-2 py-0.5 rounded text-xs font-bold uppercase tracking-wider bg-gray-100 text-gray-600">${intent}</span>
                        ${priority === 'urgent' ? '<span class="px-2 py-0.5 rounded text-xs bg-red-100 text-red-800 font-bold">URGENT</span>' : ''}
                    </div>
                    <span class="text-xs text-gray-400">${new Date().toLocaleTimeString()}</span>
                </div>
                <h3 class="font-bold text-gray-800 mb-1">${data.title || 'No Title'}</h3>
                <p class="text-gray-600 text-sm mb-3">${data.body || 'No content'}</p>
                <div class="pt-3 border-t border-gray-50 flex justify-between items-center text-xs text-gray-500">
                    <div class="flex gap-4">
                        <span>🏷️ ${type}</span>
                        <span>👤 ${role}</span>
                    </div>
                    <code class="bg-gray-100 px-2 py-0.5 rounded text-gray-500 font-mono">ID: ${data._id || data.notificationId?.slice(-6) || 'N/A'}</code>
                </div>
                <div class="mt-2 text-xs text-gray-400 cursor-pointer hover:text-blue-500" onclick="this.nextElementSibling.classList.toggle('hidden')">
                    ▶ Show Raw Payload
                </div>
                <pre class="hidden mt-2 p-2 bg-gray-800 text-green-400 rounded text-xs overflow-x-auto">${JSON.stringify(data, null, 2)}</pre>
            `;

            area.prepend(card);
        }

        function updatePayloadTemplate() {
            const type = document.getElementById('eventType').value;
            const area = document.getElementById('eventData');

            const templates = {
                'company.created': {
                    id: "cc6b8939-03bd-49c5-a034-da8d734a6cdb",
                    name: "Acme Corp",
                    adminId: "user_admin_123",
                    email: "admin@acme.com",
                    phone: "+1234567890"
                },
                'company.suspended': {
                    companyId: "cc6b8939-03bd-49c5-a034-da8d734a6cdb",
                    reason: "Policy violation"
                },
                'shop.created': {
                    companyId: "cc6b8939-03bd-49c5-a034-da8d734a6cdb",
                    shopId: "b4309875-c180-4b8b-bc4e-5009dec719c8",
                    name: "Downtown Branch",
                    managerId: "manager_123"
                },
                'sale.created': {
                    companyId: "cc6b8939-03bd-49c5-a034-da8d734a6cdb",
                    shopId: "b4309875-c180-4b8b-bc4e-5009dec719c8",
                    customerId: "cust_789",
                    totalAmount: 150.00,
                    items: [{ name: "Item 1", price: 50 }, { name: "Item 2", price: 100 }]
                },
                'sale.return.created': {
                    companyId: "cc6b8939-03bd-49c5-a034-da8d734a6cdb",
                    shopId: "b4309875-c180-4b8b-bc4e-5009dec719c8",
                    saleId: "sale_123",
                    returnId: "ret_999",
                    refundAmount: 50.00,
                    reason: "Defective item",
                    items: [{ productId: "prod_1", quantity: 1, refundAmount: 50 }]
                },
                'inventory.low_stock': {
                    companyId: "cc6b8939-03bd-49c5-a034-da8d734a6cdb",
                    shopId: "b4309875-c180-4b8b-bc4e-5009dec719c8",
                    productId: "prod_123",
                    productName: "Premium Steak",
                    currentStock: 5,
                    threshold: 10
                },
                'inventory.out_of_stock': {
                    companyId: "cc6b8939-03bd-49c5-a034-da8d734a6cdb",
                    shopId: "b4309875-c180-4b8b-bc4e-5009dec719c8",
                    productId: "prod_999",
                    productName: "Popular Item",
                    currentStock: 0
                },
                'debt.overdue': {
                    companyId: "cc6b8939-03bd-49c5-a034-da8d734a6cdb",
                    shopId: "b4309875-c180-4b8b-bc4e-5009dec719c8",
                    debtId: "debt_001",
                    amount: 500.00,
                    customerName: "John Doe",
                    dueDate: "2024-01-01"
                },
                'payment.success': {
                    companyId: "cc6b8939-03bd-49c5-a034-da8d734a6cdb",
                    amount: 99.00,
                    reference: "inv_001",
                    method: "credit_card"
                },
                'payment.failed': {
                    companyId: "cc6b8939-03bd-49c5-a034-da8d734a6cdb",
                    amount: 99.00,
                    reason: "Insufficient funds"
                },
                'user.created': {
                    id: "user_new_001",
                    name: "New User",
                    email: "newuser@example.com",
                    role: "worker",
                    companyId: "cc6b8939-03bd-49c5-a034-da8d734a6cdb"
                }
            };

            if (templates[type]) {
                area.value = JSON.stringify(templates[type], null, 2);
            }
        }

        async function simulateEvent() {
            const baseUrl = document.getElementById('apiBaseUrl').value;
            const token = document.getElementById('apiToken').value; // from Trigger section
            const type = document.getElementById('eventType').value;
            const dataStr = document.getElementById('eventData').value;
            const statusEl = document.getElementById('simResponse');

            statusEl.textContent = 'Sending...';
            statusEl.className = 'mt-2 text-xs text-center text-blue-500';

            try {
                const data = JSON.parse(dataStr);

                const response = await fetch(`${baseUrl}/notification/simulate`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        type: type,
                        data: data,
                        source: 'dashboard-simulation'
                    })
                });

                const result = await response.json();

                if (result.success) {
                    statusEl.textContent = `✅ Event sent! ID: ${result.eventId}`;
                    statusEl.className = 'mt-2 text-xs text-center text-green-600';
                    logSystem(`📤 Simulated ${type} (ID: ${result.eventId})`);
                } else {
                    statusEl.textContent = `❌ Error: ${result.message}`;
                    statusEl.className = 'mt-2 text-xs text-center text-red-600';
                }

            } catch (err) {
                statusEl.textContent = `❌ Failed: ${err.message}`;
                statusEl.className = 'mt-2 text-xs text-center text-red-600';
                if (err instanceof SyntaxError) {
                    alert('Invalid JSON in event data');
                }
            }
        }
        document.addEventListener('DOMContentLoaded', () => {
            updatePayloadTemplate();
        });
    </script>
</body>

</html>
