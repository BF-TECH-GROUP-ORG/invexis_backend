# ==================================================================================
# PROMETHEUS CONFIGURATION - PRODUCTION MONITORING
# ==================================================================================
# Global configuration for Prometheus monitoring system
# Scrapes metrics from all Invexis microservices and infrastructure components
# ==================================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  external_labels:
    cluster: "invexis-production"
    environment: "prod"

# Rule files configuration
rule_files:
  - "rules.yml"

# Alert manager configuration
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - "alertmanager:9093"

# Scrape configurations
scrape_configs:
  # Prometheus itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
    metrics_path: "/metrics"
    scrape_interval: 30s

  # Node Exporter (system metrics)
  - job_name: "node-exporter"
    static_configs:
      - targets: ["node-exporter:9100"]
    metrics_path: "/metrics"
    scrape_interval: 30s

  # Traefik metrics
  - job_name: "traefik"
    static_configs:
      - targets: ["traefik:8080"]
    metrics_path: "/metrics"
    scrape_interval: 30s

  # ==================================================================================
  # INVEXIS MICROSERVICES - BLUE DEPLOYMENT
  # ==================================================================================

  # API Gateway Blue
  - job_name: "api-gateway-blue"
    static_configs:
      - targets: ["api-gateway-blue:8000"]
    metrics_path: "/metrics"
    scrape_interval: 15s
    scrape_timeout: 10s
    params:
      format: ["prometheus"]
    labels:
      service: "api-gateway"
      deployment: "blue"
      tier: "gateway"

  # Auth Service Blue
  - job_name: "auth-service-blue"
    static_configs:
      - targets: ["auth-service-blue:8001"]
    metrics_path: "/metrics"
    scrape_interval: 15s
    labels:
      service: "auth-service"
      deployment: "blue"
      tier: "core"

  # Company Service Blue
  - job_name: "company-service-blue"
