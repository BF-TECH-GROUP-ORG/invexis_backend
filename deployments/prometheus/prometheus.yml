    scrape_interval: 30s
    labels:
      service: "docker"
      tier: "infrastructure"

# ==================================================================================
# RECORDING RULES FOR PERFORMANCE
# ==================================================================================
recording_rules:
  # Service availability rules
  - interval: 30s
    rules:
      - record: instance:up:rate5m
        expr: rate(up[5m])

      - record: job:up:avg
        expr: avg(up) by (job)

  # HTTP request rate rules
  - interval: 30s
    rules:
      - record: instance:http_requests:rate5m
        expr: rate(http_requests_total[5m])

      - record: instance:http_request_duration:p95
        expr: histogram_quantile(0.95, rate(http_request_duration_seconds_bucket[5m]))

      - record: instance:http_request_duration:p99
        expr: histogram_quantile(0.99, rate(http_request_duration_seconds_bucket[5m]))

  # Error rate rules
  - interval: 30s
    rules:
      - record: instance:http_errors:rate5m
        expr: rate(http_requests_total{status=~"4..|5.."}[5m])

      - record: instance:error_rate:ratio
        expr: instance:http_errors:rate5m / instance:http_requests:rate5m
