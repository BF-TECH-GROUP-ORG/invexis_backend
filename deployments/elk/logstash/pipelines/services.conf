# ==================================================================================
# LOGSTASH PIPELINE CONFIGURATION - INVEXIS SERVICES
# ==================================================================================
# This pipeline processes logs from all Invexis microservices and infrastructure
# ==================================================================================

input {
  # Docker logs input
  beats {
    port => 5044
  }

  # Direct syslog input for system logs
  syslog {
    port => 5140
    type => "syslog"
  }

  # HTTP input for webhook logs
  http {
    port => 8080
    codec => json
    type => "webhook"
  }

  # TCP input for application logs
  tcp {
    port => 5000
    codec => json_lines
    type => "application"
  }

  # UDP input for high-volume logs
  udp {
    port => 5001
    codec => json
    type => "metrics"
  }
}

filter {
  # ================================================================================
  # DOCKER CONTAINER LOG PROCESSING
  # ================================================================================
  if [container] {
    # Extract service name from container name
    if [container][name] {
      mutate {
        add_field => { "service_name" => "%{[container][name]}" }
      }
      
      # Clean up service name
      mutate {
        gsub => [ "service_name", "^invexis-", "" ]
        gsub => [ "service_name", "-prod$", "" ]
        gsub => [ "service_name", "-blue$", "" ]
        gsub => [ "service_name", "-green$", "" ]
      }
    }

    # Add deployment color if present
    if [container][name] =~ /-blue/ {
      mutate { add_field => { "deployment_color" => "blue" } }
    } else if [container][name] =~ /-green/ {
      mutate { add_field => { "deployment_color" => "green" } }
    }

    # Set log level based on container labels
    if [container][labels][log_level] {
      mutate {
        add_field => { "log_level" => "%{[container][labels][log_level]}" }
      }
    }
  }

  # ================================================================================
  # JSON LOG PARSING
  # ================================================================================
  if [message] =~ /^\s*\{/ {
    json {
      source => "message"
      skip_on_invalid_json => true
    }
    
    # Extract timestamp if present
    if [timestamp] {
      date {
        match => [ "timestamp", "ISO8601" ]
      }
    } else if [@timestamp] {
      # Use existing timestamp
    }
    
    # Normalize log level
    if [level] {
      mutate {
        uppercase => [ "level" ]
        rename => { "level" => "log_level" }
      }
    }
  }

  # ================================================================================
  # SERVICE-SPECIFIC PROCESSING
  # ================================================================================
  
  # API Gateway logs
  if [service_name] == "api-gateway" {
    if [message] =~ /HTTP/ {
      grok {
        match => { "message" => "%{COMBINEDAPACHELOG}" }
        tag_on_failure => ["_grokparsefailure_api_gateway"]
      }
      
      # Extract response time if available
      if [response_time] {
        mutate {
          convert => { "response_time" => "float" }
        }
      }
    }
  }

  # Auth Service logs
  if [service_name] == "auth-service" {
    # Track authentication events
    if [message] =~ /login|authentication|jwt/ {
      mutate {
        add_field => { "event_type" => "authentication" }
      }
      
      # Extract user ID if present
      if [user_id] {
        mutate {
          add_field => { "user" => "%{user_id}" }
        }
      }
    }
    
    # Track security events
    if [message] =~ /failed|error|unauthorized|forbidden/ {
      mutate {
        add_field => { "security_event" => "true" }
        add_tag => [ "security" ]
      }
    }
  }

  # Database logs
  if [service_name] =~ /postgres|mysql|mongodb/ {
    mutate {
      add_field => { "component" => "database" }
    }
    
    # Extract database name if available
    if [database] {
      mutate {
        add_field => { "db_name" => "%{database}" }
      }
    }
  }

  # Payment Service logs
  if [service_name] == "payment-service" {
    mutate {
      add_field => { "component" => "payment" }
      add_tag => [ "business_critical" ]
    }
    
    # Track payment events
    if [message] =~ /payment|transaction|stripe|paypal/ {
      mutate {
        add_field => { "event_type" => "payment" }
      }
    }
  }

  # Error tracking across all services
  if [log_level] in ["ERROR", "FATAL"] {
    mutate {
      add_tag => [ "error" ]
    }
    
    # Extract stack trace if present
    if [stack_trace] or [stackTrace] or [error] {
      mutate {
        add_field => { "has_stack_trace" => "true" }
      }
    }
  }

  # Performance tracking
  if [response_time] {
    if [response_time] > 5000 {
      mutate {
        add_tag => [ "slow_response" ]
      }
    }
  }

  # ================================================================================
  # ENRICHMENT
  # ================================================================================
  
  # Add environment information
  mutate {
    add_field => { 
      "environment" => "production"
      "cluster" => "invexis-prod"
      "platform" => "docker"
    }
  }

  # Add geo information if IP is available
  if [client_ip] {
    geoip {
      source => "client_ip"
      target => "geoip"
    }
  }

  # Parse user agent if available
  if [user_agent] {
    useragent {
      source => "user_agent"
      target => "ua"
    }
  }

  # ================================================================================
  # FIELD CLEANUP
  # ================================================================================
  
  # Remove sensitive fields
  mutate {
    remove_field => [ "password", "secret", "token", "key", "authorization" ]
  }

  # Clean up empty fields
  ruby {
    code => "
      event.to_hash.keys.each { |k| 
        event.remove(k) if event.get(k).nil? || (event.get(k).respond_to?(:empty?) && event.get(k).empty?)
      }
    "
  }
}

output {
  # ================================================================================
  # ELASTICSEARCH OUTPUT
  # ================================================================================
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    user => "elastic"
    password => "${ELASTIC_PASSWORD}"
    
    # Index strategy based on service and date
    index => "logstash-invexis-%{service_name:unknown}-%{+YYYY.MM.dd}"
    
    # Document ID for deduplication
    document_id => "%{[@metadata][fingerprint]}"
    
    # Template management
    manage_template => true
    template_name => "invexis"
    template_pattern => "logstash-invexis-*"
    template => "/usr/share/logstash/templates/invexis-template.json"
    
    # Pipeline configuration
    pipeline => "invexis-enrichment"
  }

  # ================================================================================
  # ERROR HANDLING OUTPUT
  # ================================================================================
  if "error" in [tags] or "security" in [tags] {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      user => "elastic" 
      password => "${ELASTIC_PASSWORD}"
      index => "invexis-alerts-%{+YYYY.MM.dd}"
    }
  }

  # ================================================================================
  # DEBUGGING OUTPUT (remove in production)
  # ================================================================================
  # stdout {
  #   codec => rubydebug {
  #     metadata => true
  #   }
  # }

  # ================================================================================
  # DEAD LETTER QUEUE
  # ================================================================================
  if "_grokparsefailure" in [tags] or "_jsonparsefailure" in [tags] {
    elasticsearch {
      hosts => ["elasticsearch:9200"]
      user => "elastic"
      password => "${ELASTIC_PASSWORD}"
      index => "logstash-failed-%{+YYYY.MM.dd}"
    }
  }
}