# ==================================================================================
# REDIS PRODUCTION CONFIGURATION
# ==================================================================================

# Networking
port 6379
bind 0.0.0.0

# Memory Management
maxmemory 512mb
maxmemory-policy allkeys-lru

# Persistence
appendonly yes
appendfsync everysec

# Security
# Password will be injected via command line in docker-compose
# requirepass ${REDIS_PASSWORD}

# Performance Tuning
tcp-keepalive 300
timeout 0
