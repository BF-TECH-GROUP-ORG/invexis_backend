# ==================================================================================
# VOLUMES - PERSISTENT DATA STORAGE
# ==================================================================================
volumes:
  # Database volumes
  company_postgres_data:
    driver: local
    name: invexis_company_postgres_prod_data
  shop_postgres_data:
    driver: local
    name: invexis_shop_postgres_prod_data
  payment_postgres_data:
    driver: local
    name: invexis_payment_postgres_prod_data
  analytics_postgres_data:
    driver: local
    name: invexis_analytics_postgres_prod_data
  grafana_postgres_data:
    driver: local
    name: invexis_grafana_postgres_prod_data
  sales_mysql_data:
    driver: local
    name: invexis_sales_mysql_prod_data
  mongodb_data:
    driver: local
    name: invexis_mongodb_prod_data
  mongodb_config:
    driver: local
    name: invexis_mongodb_config_prod_data
  redis_data:
    driver: local
    name: invexis_redis_prod_data
  rabbitmq_data:
    driver: local
    name: invexis_rabbitmq_prod_data

  # Monitoring volumes
  prometheus_data:
    driver: local
    name: invexis_prometheus_prod_data
  grafana_data:
    driver: local
    name: invexis_grafana_prod_data
  elasticsearch_data:
    driver: local
    name: invexis_elasticsearch_prod_data
  traefik_data:
    driver: local
    name: invexis_traefik_prod_data

  # Application volumes
  sales_uploads:
    driver: local
    name: invexis_sales_uploads_prod_data

# ==================================================================================
# NETWORKS - ISOLATED PRODUCTION NETWORK
# ==================================================================================
networks:
  invexis-prod-network:
    driver: bridge
    name: invexis-prod-network
    ipam:
      config:
        - subnet: 172.20.0.0/16