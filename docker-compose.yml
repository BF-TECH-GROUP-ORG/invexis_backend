version: '3.8'

services:
  # ----------------------
  # Reverse Proxy with Load Balancing
  # ----------------------
  traefik:
    image: traefik:v2.9
    container_name: invexis-traefik
    restart: unless-stopped
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - invexis-network
    deploy:
      replicas: 1 # Scale for HA if needed
    labels:
      - "traefik.enable=true"

  # ----------------------
  # Databases
  # ----------------------

  # PostgreSQL for company-service
  company-postgres:
    image: postgres:15
    container_name: invexis-company-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: invexis
      POSTGRES_PASSWORD: invexispass
      POSTGRES_DB: companydb
    ports:
      - "5432:5432"
    volumes:
      - company_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U invexis -d companydb" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - invexis-network
    deploy:
      replicas: 1

  # PostgreSQL for shop-service
  shop-postgres:
    image: postgres:15
    container_name: invexis-shop-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: invexis
      POSTGRES_PASSWORD: invexispass
      POSTGRES_DB: shopdb
    ports:
      - "5435:5432"
    volumes:
      - shop_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U invexis -d shopdb" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - invexis-network
    deploy:
      replicas: 1

  # PostgreSQL for payment-service
  payment-postgres:
    image: postgres:15
    container_name: invexis-payment-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: invexis
      POSTGRES_PASSWORD: invexispass
      POSTGRES_DB: paymentdb
    ports:
      - "5433:5432"
    volumes:
      - payment_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U invexis -d paymentdb" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - invexis-network
    deploy:
      replicas: 1

  # PostgreSQL for analytics-service
  analytics-postgres:
    image: postgres:15
    container_name: invexis-analytics-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: invexis
      POSTGRES_PASSWORD: invexispass
      POSTGRES_DB: analyticsdb
    ports:
      - "5434:5432"
    volumes:
      - analytics_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U invexis -d analyticsdb" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - invexis-network
    deploy:
      replicas: 1
  # ----------------------
  # Single MongoDB for all services
  # ----------------------
  mongodb:
    image: mongo:6.0
    container_name: invexis-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: invexispass
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test: [ "CMD", "mongo", "--eval", "db.adminCommand('ping')" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ----------------------
  # MySQL for sales-service
  # ----------------------
  sales-mysql:
    image: mysql:8.4.0
    container_name: invexis-sales-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpass
      MYSQL_DATABASE: salesdb
      MYSQL_USER: invexis
      MYSQL_PASSWORD: invexispass
    ports:
      - "3306:3306"
    volumes:
      - sales_mysql_data:/var/lib/mysql
    command: [ "--log-error-verbosity=3", "--innodb-flush-method=fsync", "--skip-log-bin", "--innodb-buffer-pool-size=128M", "--bind-address=0.0.0.0" ]
    healthcheck:
      test: [ "CMD-SHELL", "mysqladmin ping -h localhost -u root -prootpass || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 90s
    networks:
      - invexis-network
    deploy:
      replicas: 1

  # ----------------------
  # Messaging & Caching
  # ----------------------
  redis:
    image: redis:7-alpine
    container_name: invexis-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - invexis-network
    deploy:
      replicas: 1

  rabbitmq:
    image: rabbitmq:3.13.7-management-alpine
    container_name: invexis-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: invexis
      RABBITMQ_DEFAULT_PASS: invexispass
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmqctl", "status" ]
      interval: 20s
      timeout: 15s
      retries: 10
      start_period: 90s
    networks:
      - invexis-network
    deploy:
      replicas: 1

  # ----------------------
  # Microservices (All with Shared Volumes & Traefik Routing)
  # ----------------------
  api-gateway:
    build: ./services/api-gateway
    container_name: invexis-api-gateway
    restart: unless-stopped
    ports:
      - "4000:4000"
    environment:
      RABBITMQ_URL: amqp://invexis:invexispass@rabbitmq:5672
    volumes:
      - ./shared:/app/shared
    depends_on:
      auth-service:
        condition: service_healthy
      company-service:
        condition: service_healthy
      shop-service:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
      ecommerce-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      analytics-service:
        condition: service_healthy
      audit-service:
        condition: service_healthy
      debt-service:
        condition: service_healthy
      websocket-service:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4000/health" ]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - invexis-network
    deploy:
      replicas: 1 # Scale for load balancing via Traefik
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api-gateway.rule=Host(`api-gateway.local`)"
      - "traefik.http.services.api-gateway.loadbalancer.server.port=4000"
      - "traefik.http.routers.api-gateway.entrypoints=web"

  auth-service:
    build: ./services/auth-service
    container_name: invexis-auth-service
    restart: unless-stopped
    environment:
      DB_MONGO: mongodb://root:invexispass@mongodb:27017/authdb?authSource=admin
      RABBITMQ_URL: amqp://invexis:invexispass@rabbitmq:5672
    volumes:
      - ./shared:/app/shared
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3001/health" ]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - invexis-network
    deploy:
      replicas: 1
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.auth-service.rule=Host(`auth.local`)"
      - "traefik.http.services.auth-service.loadbalancer.server.port=3001"
      - "traefik.http.routers.auth-service.entrypoints=web"

  company-service:
    build: ./services/company-service
    container_name: invexis-company-service
    restart: unless-stopped
    environment:
      DB_POSTGRES: postgresql://invexis:invexispass@company-postgres:5432/companydb
      RABBITMQ_URL: amqp://invexis:invexispass@rabbitmq:5672
    volumes:
      - ./shared:/app/shared
    depends_on:
      company-postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3002/health" ]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - invexis-network
    deploy:
      replicas: 1
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.company-service.rule=Host(`company.local`)"
      - "traefik.http.services.company-service.loadbalancer.server.port=3002"
      - "traefik.http.routers.company-service.entrypoints=web"

  shop-service:
    build: ./services/shop-service
    container_name: invexis-shop-service
    restart: unless-stopped
    ports:
      - "4009:4009"
    environment:
      DB_POSTGRES: postgresql://invexis:invexispass@shop-postgres:5432/shopdb
      RABBITMQ_URL: amqp://invexis:invexispass@rabbitmq:5672
    volumes:
      - ./shared:/app/shared
    depends_on:
      shop-postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:4009/health" ]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - invexis-network
    deploy:
      replicas: 1
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.shop-service.rule=Host(`shop.local`)"
      - "traefik.http.services.shop-service.loadbalancer.server.port=4009"
      - "traefik.http.routers.shop-service.entrypoints=web"

  inventory-service:
    build: ./services/inventory-service
    container_name: invexis-inventory-service
    restart: unless-stopped
    environment:
      DB_MONGO: mongodb://root:invexispass@mongodb:27017/inventorydb?authSource=admin
      RABBITMQ_URL: amqp://invexis:invexispass@rabbitmq:5672
    volumes:
      - ./shared:/app/shared
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3003/health" ]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - invexis-network
    deploy:
      replicas: 1
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.inventory-service.rule=Host(`inventory.local`)"
      - "traefik.http.services.inventory-service.loadbalancer.server.port=3003"
      - "traefik.http.routers.inventory-service.entrypoints=web"

  sales-service:
    build: ./services/sales-service
    container_name: invexis-sales-service
    restart: unless-stopped
    environment:
      DB_MYSQL: mysql://invexis:invexispass@sales-mysql:3306/salesdb
      RABBITMQ_URL: amqp://invexis:invexispass@rabbitmq:5672
    volumes:
      - ./shared:/app/shared
      - ./services/sales-service/uploads:/app/uploads
      # Mount source code but preserve container-installed node_modules by
      # using a separate named volume for /app/node_modules. This avoids the
      # host bind-mount from hiding installed dependencies (e.g. dotenv).
      - ./services/sales-service:/app
      - sales_service_node_modules:/app/node_modules
    depends_on:
      sales-mysql:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3005/health" ]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - invexis-network
    deploy:
      replicas: 1
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.sales-service.rule=Host(`sales.local`)"
      - "traefik.http.services.sales-service.loadbalancer.server.port=3005"
      - "traefik.http.routers.sales-service.entrypoints=web"

  payment-service:
    build: ./services/payment-service
    container_name: invexis-payment-service
    restart: unless-stopped
    environment:
      DB_POSTGRES: postgresql://invexis:invexispass@payment-postgres:5432/paymentdb
      RABBITMQ_URL: amqp://invexis:invexispass@rabbitmq:5672
    volumes:
      - ./shared:/app/shared
    depends_on:
      payment-postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3006/health" ]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - invexis-network
    deploy:
      replicas: 1
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.payment-service.rule=Host(`payment.local`)"
      - "traefik.http.services.payment-service.loadbalancer.server.port=3006"
      - "traefik.http.routers.payment-service.entrypoints=web"

  ecommerce-service:
    build: ./services/ecommerce-service
    container_name: invexis-ecommerce-service
    restart: unless-stopped
    environment:
      DB_MONGO: mongodb://root:invexispass@mongodb:27017/ecommercedb?authSource=admin
      RABBITMQ_URL: amqp://invexis:invexispass@rabbitmq:5672
    volumes:
      - ./shared:/app/shared
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3007/health" ]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - invexis-network
    deploy:
      replicas: 1
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ecommerce-service.rule=Host(`ecommerce.local`)"
      - "traefik.http.services.ecommerce-service.loadbalancer.server.port=3007"
      - "traefik.http.routers.ecommerce-service.entrypoints=web"

  notification-service:
    build: ./services/notification-service
    container_name: invexis-notification-service
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://invexis:invexispass@rabbitmq:5672
    volumes:
      - ./shared:/app/shared
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3008/health" ]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - invexis-network
    deploy:
      replicas: 1
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.notification-service.rule=Host(`notification.local`)"
      - "traefik.http.services.notification-service.loadbalancer.server.port=3008"
      - "traefik.http.routers.notification-service.entrypoints=web"

  analytics-service:
    build: ./services/analytics-service
    container_name: invexis-analytics-service
    restart: unless-stopped
    environment:
      DB_POSTGRES: postgresql://invexis:invexispass@analytics-postgres:5432/analyticsdb
      DB_MONGO: mongodb://root:invexispass@mongodb:27017/analyticsdb?authSource=admin
      RABBITMQ_URL: amqp://invexis:invexispass@rabbitmq:5672
    volumes:
      - ./shared:/app/shared
    depends_on:
      analytics-postgres:
        condition: service_healthy
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3009/health" ]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - invexis-network
    deploy:
      replicas: 1
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.analytics-service.rule=Host(`analytics.local`)"
      - "traefik.http.services.analytics-service.loadbalancer.server.port=3009"
      - "traefik.http.routers.analytics-service.entrypoints=web"

  audit-service:
    build: ./services/audit-service
    container_name: invexis-audit-service
    restart: unless-stopped
    environment:
      DB_MONGO: mongodb://root:invexispass@mongodb:27017/auditdb?authSource=admin
      RABBITMQ_URL: amqp://invexis:invexispass@rabbitmq:5672
    volumes:
      - ./shared:/app/shared
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3010/health" ]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - invexis-network
    deploy:
      replicas: 1
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.audit-service.rule=Host(`audit.local`)"
      - "traefik.http.services.audit-service.loadbalancer.server.port=3010"
      - "traefik.http.routers.audit-service.entrypoints=web"

  debt-service:
    build: ./services/debt-service
    container_name: invexis-debt-service
    restart: unless-stopped
    environment:
      DB_MONGO: mongodb://root:invexispass@mongodb:27017/debtdb?authSource=admin
      RABBITMQ_URL: amqp://invexis:invexispass@rabbitmq:5672
    volumes:
      - ./shared:/app/shared
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3011/health" ]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - invexis-network
    deploy:
      replicas: 1
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.debt-service.rule=Host(`debt.local`)"
      - "traefik.http.services.debt-service.loadbalancer.server.port=3011"
      - "traefik.http.routers.debt-service.entrypoints=web"

  websocket-service:
    build: ./services/websocket-service
    container_name: invexis-websocket-service
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://invexis:invexispass@rabbitmq:5672
    volumes:
      - ./shared:/app/shared
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "3004:3004"
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3004/health" ]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - invexis-network
    deploy:
      replicas: 1
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.websocket-service.rule=Host(`websocket.local`)"
      - "traefik.http.services.websocket-service.loadbalancer.server.port=3004"
      - "traefik.http.routers.websocket-service.entrypoints=web"

# ----------------------
# Volumes
# ----------------------
volumes:
  company_postgres_data:
    name: invexis_company_postgres_data
  shop_postgres_data:
    name: invexis_shop_postgres_data
  payment_postgres_data:
    name: invexis_payment_postgres_data
  analytics_postgres_data:
    name: invexis_analytics_postgres_data
  sales_mysql_data:
    name: invexis_sales_mysql_data
  mongodb_data:
    name: invexis_mongodb_data
  redis_data:
    name: invexis_redis_data
  rabbitmq_data:
    name: invexis_rabbitmq_data
  # Keep node_modules installed inside the sales-service container
  sales_service_node_modules:
    name: invexis_sales_service_node_modules

# ----------------------
# Networks
# ----------------------
networks:
  invexis-network:
    driver: bridge
    name: invexis-network
