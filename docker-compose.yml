    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ecommerce-service.rule=Host(`ecommerce.local`)"
      - "traefik.http.services.ecommerce-service.loadbalancer.server.port=8006"
      - "traefik.http.routers.ecommerce-service.entrypoints=web"

  notification-service:
    build: ./services/notification-service
    container_name: invexis-notification-service
    restart: unless-stopped
    ports:
      - "8008:8008"
    environment:
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://invexis:invexispass@rabbitmq:5672
    volumes:
      - ./shared:/app/shared
    depends_on:
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD"
        - "wget"
        - "--no-verbose"
        - "--tries=1"
        - "--spider"
        - "http://localhost:8008/health"
      interval: 15s
      timeout: 10s
      retries: 3
