      PORT: 8007
      LOG_LEVEL: info
      MAX_STOCK_QTY: 1000000
      # Cloudinary Configuration
      CLOUDINARY_CLOUD_NAME: dnetsa2kl
      CLOUDINARY_API_KEY: 577429559625369
      CLOUDINARY_API_SECRET: cN2IiS5983Yok8JRz1fFR9T3xVk
    volumes:
      - ./shared:/app/shared
      - ./services/inventory-service:/app
    depends_on:
      mongodb:
        condition: service_healthy
