    deploy:
      replicas: 1
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.shop-service.rule=Host(`shop.local`)"
      - "traefik.http.services.shop-service.loadbalancer.server.port=9001"
      - "traefik.http.routers.shop-service.entrypoints=web"

  inventory-service:
    build: ./services/inventory-service
    container_name: invexis-inventory-service
    restart: unless-stopped
    ports:
      - "8007:8007"
    environment:
      DB_MONGO: mongodb://root:invexispass@mongodb:27017/inventorydb?authSource=admin
      RABBITMQ_URL: amqp://invexis:invexispass@rabbitmq:5672
    volumes:
      - ./shared:/app/shared
      - ./services/inventory-service:/app
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD"
        - "wget"
        - "--no-verbose"
        - "--tries=1"
        - "--spider"
        - "http://localhost:8007/health"
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
