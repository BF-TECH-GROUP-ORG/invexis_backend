services:
  # ----------------------
  # Traefik Reverse Proxy
  # ----------------------
  traefik:
    image: traefik:v2.9
    container_name: invexis-traefik
    restart: unless-stopped
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - invexis-network
    labels:
      - "traefik.enable=true"

  # ----------------------
  # Databases
  # ----------------------
  company-postgres:
    image: postgis/postgis:16-3.4
    container_name: invexis-company-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: invexis
      POSTGRES_PASSWORD: invexispass
      POSTGRES_DB: companydb
    ports:
      - "5432:5432"
    volumes:
      - company_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U invexis -d companydb" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - invexis-network

  shop-postgres:
    image: postgis/postgis:16-3.4
    container_name: invexis-shop-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: invexis
      POSTGRES_PASSWORD: invexispass
      POSTGRES_DB: shopdb
    ports:
      - "5435:5432"
    volumes:
      - shop_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U invexis -d shopdb" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - invexis-network

  payment-postgres:
    image: postgres:16
    container_name: invexis-payment-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: invexis
      POSTGRES_PASSWORD: invexispass
      POSTGRES_DB: paymentdb
    ports:
      - "5433:5432"
    volumes:
      - payment_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U invexis -d paymentdb" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - invexis-network

  analytics-postgres:
    image: timescale/timescaledb:latest-pg16
    container_name: invexis-analytics-postgres
    command: [ "postgres", "-c", "listen_addresses=*" ]
    restart: unless-stopped
    environment:
      POSTGRES_USER: invexis
      POSTGRES_PASSWORD: invexispass
      POSTGRES_DB: analyticsdb
    ports:
      - "5434:5432"
    volumes:
      - analytics_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U invexis -d analyticsdb" ]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - invexis-network

  mongodb:
    image: mongo:6.0
    container_name: mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: invexispass
    ports:
      - "27018:27017"
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test:
        - "CMD-SHELL"
        - 'mongosh --username root --password invexispass --authenticationDatabase admin --eval ''db.adminCommand("ping")'' || exit 1'
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - invexis-network

  sales-mysql:
    image: mysql:8.0
    container_name: invexis-sales-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: invexis
      MYSQL_PASSWORD: invexispass
      MYSQL_DATABASE: salesdb
    ports:
      - "3307:3306"
    volumes:
      - sales_mysql_data:/var/lib/mysql
    command: [ "--log-error-verbosity=3", "--innodb-flush-method=fsync", "--skip-log-bin", "--innodb-buffer-pool-size=128M", "--bind-address=0.0.0.0" ]
    healthcheck:
      test:
        - "CMD-SHELL"
        - "mysqladmin ping -h localhost -u root -proot || exit 1"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 90s
    networks:
      - invexis-network

  redis:
    image: redis:7-alpine
    container_name: invexis-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - invexis-network

  rabbitmq:
    image: rabbitmq:3.13.7-management-alpine
    container_name: invexis-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: invexis
      RABBITMQ_DEFAULT_PASS: invexispass
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: [ "CMD", "rabbitmqctl", "status" ]
      interval: 20s
      timeout: 15s
      retries: 10
      start_period: 90s
    networks:
      - invexis-network

  # ----------------------
  # Node Microservices (with persistent logs)
  # ----------------------
  api-gateway:
    build: ./services/api-gateway
    container_name: invexis-api-gateway
    restart: unless-stopped
    environment:
      RABBITMQ_URL: amqp://invexis:invexispass@rabbitmq:5672
    volumes:
      - ./shared:/app/shared
      - ./services/api-gateway:/app
      - ./logs/api-gateway:/app/logs
    depends_on:
      - auth-service
      - company-service
      - shop-service
      - inventory-service
      - sales-service
      - ecommerce-service
      - payment-service
      - notification-service
      - analytics-service
      - audit-service
      - debt-service
      - websocket-service
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8000/health" ]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - invexis-network
    user: "node"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.api-gateway.rule=Host(`api-gateway.local`) && PathPrefix(`/api`)"
      - "traefik.http.services.api-gateway.loadbalancer.server.port=8000"
      - "traefik.http.routers.api-gateway.entrypoints=web"

  auth-service:
    build: ./services/auth-service
    container_name: invexis-auth-service
    restart: unless-stopped
    environment:
      DB_MONGO: mongodb://root:invexispass@mongodb:27017/authdb?authSource=admin
      RABBITMQ_URL: amqp://invexis:invexispass@rabbitmq:5672
    volumes:
      - ./shared:/app/shared
      - ./services/auth-service:/app
      - ./logs/auth-service:/app/logs
    depends_on:
      - mongodb
      - rabbitmq
    healthcheck:
      test: [ "CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8001/health" ]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - invexis-network
    user: "node"
    labels:
      - "traefik.enable=false"
  company-service:
    build: ./services/company-service
    container_name: invexis-company-service
    restart: unless-stopped
    environment:
      DB_POSTGRES: postgresql://invexis:invexispass@company-postgres:5432/companydb
      RABBITMQ_URL: amqp://invexis:invexispass@rabbitmq:5672
    volumes:
      - ./shared:/app/shared
      - ./services/company-service:/app
      - ./logs/company-service:/app/logs
    depends_on:
      - company-postgres
      - rabbitmq
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8004/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - invexis-network
    user: "node"
    labels:
      - "traefik.enable=false"

  shop-service:
    build: ./services/shop-service
    container_name: invexis-shop-service
    restart: unless-stopped
    environment:
      DB_POSTGRES: postgresql://invexis:invexispass@shop-postgres:5432/shopdb
      RABBITMQ_URL: amqp://invexis:invexispass@rabbitmq:5672
    volumes:
      - ./shared:/app/shared
      - ./services/shop-service:/app
      - ./logs/shop-service:/app/logs
    depends_on:
      - shop-postgres
      - rabbitmq
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9001/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - invexis-network
    user: "node"
    labels:
      - "traefik.enable=false"

  inventory-service:
    build: ./services/inventory-service
    container_name: invexis-inventory-service
    restart: unless-stopped
    environment:
      DB_MONGO: mongodb://root:invexispass@mongodb:27017/inventorydb?authSource=admin
      RABBITMQ_URL: amqp://invexis:invexispass@rabbitmq:5672
      JWT_SECRET: your_jwt_secret_invexis_strong_key_change_in_prod
      PORT: 8007
    volumes:
      - ./shared:/app/shared
      - ./services/inventory-service:/app
      - ./logs/inventory-service:/app/logs
    depends_on:
      - mongodb
      - rabbitmq
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8007/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - invexis-network
    user: "node"
    labels:
      - "traefik.enable=false"

  sales-service:
    build: ./services/sales-service
    container_name: invexis-sales-service
    restart: unless-stopped
    environment:
      DB_MYSQL: mysql://invexis:invexispass@sales-mysql:3306/salesdb
      RABBITMQ_URL: amqp://invexis:invexispass@rabbitmq:5672
    volumes:
      - ./shared:/app/shared
      - ./services/sales-service:/app
      - ./services/sales-service/uploads:/app/uploads
      - ./logs/sales-service:/app/logs
    depends_on:
      - sales-mysql
      - rabbitmq
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9000/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - invexis-network
    user: "node"
    labels:
      - "traefik.enable=false"

  payment-service:
    build: ./services/payment-service
    container_name: invexis-payment-service
    restart: unless-stopped
    environment:
      DB_POSTGRES: postgresql://invexis:invexispass@payment-postgres:5432/paymentdb
      RABBITMQ_URL: amqp://invexis:invexispass@rabbitmq:5672
    volumes:
      - ./shared:/app/shared
      - ./services/payment-service:/app
      - ./logs/payment-service:/app/logs
    depends_on:
      - payment-postgres
      - rabbitmq
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8009/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - invexis-network
    user: "node"
    labels:
      - "traefik.enable=false"

  ecommerce-service:
    build: ./services/ecommerce-service
    container_name: invexis-ecommerce-service
    restart: unless-stopped
    environment:
      DB_MONGO: mongodb://root:invexispass@mongodb:27017/ecommercedb?authSource=admin
      RABBITMQ_URL: amqp://invexis:invexispass@rabbitmq:5672
    volumes:
      - ./shared:/app/shared
      - ./services/ecommerce-service:/app
      - ./logs/ecommerce-service:/app/logs
    depends_on:
      - mongodb
      - rabbitmq
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8006/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - invexis-network
    user: "node"
    labels:
      - "traefik.enable=false"

  notification-service:
    build: ./services/notification-service
    container_name: invexis-notification-service
    restart: unless-stopped
    environment:
      REDIS_URL: redis://redis:6379
      RABBITMQ_URL: amqp://invexis:invexispass@rabbitmq:5672
    volumes:
      - ./shared:/app/shared
      - ./services/notification-service:/app
      - ./logs/notification-service:/app/logs
    depends_on:
      - redis
      - rabbitmq
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8008/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - invexis-network
    user: "node"
    labels:
      - "traefik.enable=false"

  analytics-service:
    build: ./services/analytics-service
    container_name: invexis-analytics-service
    restart: unless-stopped
    environment:
      DB_POSTGRES: postgresql://invexis:invexispass@analytics-postgres:5432/analyticsdb
      DB_MONGO: mongodb://root:invexispass@mongodb:27017/analyticsdb?authSource=admin
      RABBITMQ_URL: amqp://invexis:invexispass@rabbitmq:5672
    volumes:
      - ./shared:/app/shared
      - ./services/analytics-service:/app
      - ./logs/analytics-service:/app/logs
    depends_on:
      - analytics-postgres
      - mongodb
      - rabbitmq
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8002/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - invexis-network
    user: "node"
    labels:
      - "traefik.enable=false"

  audit-service:
    build: ./services/audit-service
    container_name: invexis-audit-service
    restart: unless-stopped
    environment:
      DB_MONGO: mongodb://root:invexispass@mongodb:27017/auditdb?authSource=admin
      RABBITMQ_URL: amqp://invexis:invexispass@rabbitmq:5672
    volumes:
      - ./shared:/app/shared
      - ./services/audit-service:/app
      - ./logs/audit-service:/app/logs
    depends_on:
      - mongodb
      - rabbitmq
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8003/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - invexis-network
    user: "node"
    labels:
      - "traefik.enable=false"

  debt-service:
    build: ./services/debt-service
    container_name: invexis-debt-service
    restart: unless-stopped
    environment:
      DB_MONGO: mongodb://root:invexispass@mongodb:27017/debtdb?authSource=admin
      RABBITMQ_URL: amqp://invexis:invexispass@rabbitmq:5672
    volumes:
      - ./shared:/app/shared
      - ./services/debt-service:/app
      - ./logs/debt-service:/app/logs
    depends_on:
      - mongodb
      - rabbitmq
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8005/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - invexis-network
    user: "node"
    labels:
      - "traefik.enable=false"

  websocket-service:
    build: ./services/websocket-service
    container_name: invexis-websocket-service
    restart: unless-stopped
    environment:
      RABBITMQ_URL: amqp://invexis:invexispass@rabbitmq:5672
    volumes:
      - ./shared:/app/shared
      - ./services/websocket-service:/app
      - ./logs/websocket-service:/app/logs
    depends_on:
      - rabbitmq
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:9002/health"]
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - invexis-network
    user: "node"
    labels:
      - "traefik.enable=false"


  # ----------------------
  # Volumes
# ======================
# Volumes
# ======================
volumes:
  # Database volumes
  company_postgres_data:
    name: invexis_company_postgres_data
  shop_postgres_data:
    name: invexis_shop_postgres_data
  payment_postgres_data:
    name: invexis_payment_postgres_data
  analytics_postgres_data:
    name: invexis_analytics_postgres_data
  sales_mysql_data:
    name: invexis_sales_mysql_data
  mongodb_data:
    name: invexis_mongodb_data
  redis_data:
    name: invexis_redis_data
  rabbitmq_data:
    name: invexis_rabbitmq_data

  # Log volumes for each microservice
  company_service_logs:
    name: invexis_company_service_logs
  shop_service_logs:
    name: invexis_shop_service_logs
  inventory_service_logs:
    name: invexis_inventory_service_logs
  sales_service_logs:
    name: invexis_sales_service_logs
  payment_service_logs:
    name: invexis_payment_service_logs
  ecommerce_service_logs:
    name: invexis_ecommerce_service_logs
  notification_service_logs:
    name: invexis_notification_service_logs
  analytics_service_logs:
    name: invexis_analytics_service_logs
  audit_service_logs:
    name: invexis_audit_service_logs
  debt_service_logs:
    name: invexis_debt_service_logs
  websocket_service_logs:
    name: invexis_websocket_service_logs

networks:
  invexis-network:
    driver: bridge
