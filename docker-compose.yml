# docker-compose.yml
# ======================
# Services
# ======================
services:
  # ----------------------
  # Reverse Proxy with Load Balancing
  # ----------------------
  traefik:
    image: traefik:v2.9
    container_name: invexis-traefik
    restart: unless-stopped
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--providers.docker.exposedbydefault=false"
      - "--entrypoints.web.address=:80"
      - "--entrypoints.websecure.address=:443"
    ports:
      - "80:80"
      - "443:443"
      - "8080:8080"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    networks:
      - invexis-network
    deploy:
      replicas: 1 # Scale for HA if needed
    labels:
      - "traefik.enable=true"

  # ----------------------
  # Databases
  # ----------------------
  # PostgreSQL for company-service
  company-postgres:
    image: postgis/postgis:15-3.4
    container_name: invexis-company-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: invexis
      POSTGRES_PASSWORD: invexispass
      POSTGRES_DB: companydb
    ports:
      - "5432:5432"
    volumes:
      - company_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U invexis -d companydb"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - invexis-network
    deploy:
      replicas: 1

  # PostgreSQL for shop-service
  shop-postgres:
    image: postgis/postgis:15-3.4
    container_name: invexis-shop-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: invexis
      POSTGRES_PASSWORD: invexispass
      POSTGRES_DB: shopdb
    ports:
      - "5435:5432"
    volumes:
      - shop_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U invexis -d shopdb"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - invexis-network
    deploy:
      replicas: 1

  # PostgreSQL for payment-service
  payment-postgres:
    image: postgres:15
    container_name: invexis-payment-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: invexis
      POSTGRES_PASSWORD: invexispass
      POSTGRES_DB: paymentdb
    ports:
      - "5433:5432"
    volumes:
      - payment_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U invexis -d paymentdb"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - invexis-network
    deploy:
      replicas: 1

  # PostgreSQL for analytics-service
  analytics-postgres:
    image: timescale/timescaledb:latest-pg15
    container_name: invexis-analytics-postgres
    command: ["postgres", "-c", "listen_addresses=*"]
    restart: unless-stopped
    environment:
      POSTGRES_USER: invexis
      POSTGRES_PASSWORD: invexispass
      POSTGRES_DB: analyticsdb
    ports:
      - "5434:5432"
    volumes:
      - analytics_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U invexis -d analyticsdb"]
      interval: 15s
      timeout: 10s
      retries: 5
      start_period: 90s
    networks:
      - invexis-network
    deploy:
      replicas: 1
  # ----------------------
  # Single MongoDB for all services
  # ----------------------
  mongodb:
    image: mongo:6.0
    container_name: mongodb
    restart: always
    environment:
      MONGO_INITDB_ROOT_USERNAME: root
      MONGO_INITDB_ROOT_PASSWORD: invexispass
    ports:
      - "27018:27017" # host:container
    volumes:
      - mongodb_data:/data/db
    healthcheck:
      test:
        - "CMD-SHELL"
        - 'mongosh --username root --password invexispass --authenticationDatabase admin --eval ''db.adminCommand("ping")'' || exit 1'
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - invexis-network

  # ======================
  # MySQL Service
  # ======================

  sales-mysql:
    image: mysql:8.4.0
    container_name: invexis-sales-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_USER: invexis
      MYSQL_PASSWORD: invexispass
      MYSQL_DATABASE: salesdb
    ports:
      - "3307:3306"
    volumes:
      - sales_mysql_data:/var/lib/mysql
    command:
      [
        "--log-error-verbosity=3",
        "--innodb-flush-method=fsync",
        "--skip-log-bin",
        "--innodb-buffer-pool-size=128M",
        "--bind-address=0.0.0.0",
      ]
    healthcheck:
      test:
        - "CMD-SHELL"
        - "mysqladmin ping -h localhost -u root -proot || exit 1"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 90s
    networks:
      - invexis-network
    deploy:
      replicas: 1

  # ----------------------
  # Messaging & Caching
  # ----------------------

  # Redis for notification-service
  redis:
    image: redis:7-alpine
    container_name: invexis-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 10s
    networks:
      - invexis-network
    deploy:
      replicas: 1

  # RabbitMQ for messaging
  rabbitmq:
    image: rabbitmq:3.13.7-management-alpine
    container_name: invexis-rabbitmq
    restart: unless-stopped
    environment:
      RABBITMQ_DEFAULT_USER: invexis
      RABBITMQ_DEFAULT_PASS: invexispass
      RABBITMQ_DEFAULT_VHOST: /
    ports:
      - "5672:5672" # AMQP protocol
      - "15672:15672" # Management UI
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 20s
      timeout: 15s
      retries: 10
      start_period: 90s
    networks:
      - invexis-network
    deploy:
      replicas: 1

  # ----------------------
  # Microservices (All with Shared Volumes & Traefik Routing)
  # ----------------------

  api-gateway:
    build: ./services/api-gateway
    container_name: invexis-api-gateway
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      RABBITMQ_URL: amqp://invexis:invexispass@rabbitmq:5672
    volumes:
      - ./shared:/app/shared
      - ./services/api-gateway:/app
    depends_on:
      auth-service:
        condition: service_healthy
      company-service:
        condition: service_healthy
      shop-service:
        condition: service_healthy
      inventory-service:
        condition: service_healthy
      sales-service:
        condition: service_healthy
      ecommerce-service:
        condition: service_healthy
      payment-service:
        condition: service_healthy
      notification-service:
        condition: service_healthy
      analytics-service:
        condition: service_healthy
      audit-service:
        condition: service_healthy
      debt-service:
        condition: service_healthy
      websocket-service:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD"
        - "wget"
        - "--no-verbose"
        - "--tries=1"
        - "--spider"
        - "http://localhost:8000/health"
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - invexis-network
    deploy:
      replicas: 1 # Scale for load balancing via Traefik
    labels:
      - "traefik.enable=true"
      # Main API Gateway - handles all /api/* routes
      - "traefik.http.routers.api-gateway.rule=(Host(`api-gateway.local`) || Host(`localhost`)) && PathPrefix(`/api`)"
      - "traefik.http.routers.api-gateway.priority=100"
      - "traefik.http.services.api-gateway.loadbalancer.server.port=8000"
      - "traefik.http.routers.api-gateway.entrypoints=web"
      # Health check endpoint
      - "traefik.http.routers.api-gateway-health.rule=PathPrefix(`/health`)"
      - "traefik.http.routers.api-gateway-health.priority=100"
      - "traefik.http.routers.api-gateway-health.entrypoints=web"

  auth-service:
    build: ./services/auth-service
    container_name: invexis-auth-service
    restart: unless-stopped
    ports:
      - "8001:8001"
    environment:
      DB_MONGO: mongodb://root:invexispass@mongodb:27017/authdb?authSource=admin
      RABBITMQ_URL: amqp://invexis:invexispass@rabbitmq:5672
    volumes:
      - ./shared:/app/shared
      - ./services/auth-service:/app
    depends_on:
      mongodb:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    healthcheck:
      test:
        - "CMD"
        - "wget"
        - "--no-verbose"
        - "--tries=1"
        - "--spider"
        - "http://localhost:8001/health"
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - invexis-network
    deploy:
      replicas: 1
    labels:
      # Disabled - access via API Gateway only
      - "traefik.enable=false"

  company-service:
    build: ./services/company-service
    container_name: invexis-company-service
    restart: unless-stopped
    ports:
